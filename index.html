<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        #gameContainer {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #gameOverScreen.show {
            display: flex;
        }

        #gameOverScreen h1 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 20px;
        }

        #gameOverScreen p {
            color: #fff;
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
        }

        #gameOverScreen button {
            padding: 15px 40px;
            font-size: 20px;
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #gameOverScreen button:hover {
            background: #FF5252;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        @media (max-width: 500px) {
            #gameContainer {
                width: 300px;
                height: 450px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="score">Score: 0</div>
        <div id="instructions">Click or tap to flap</div>
        <div id="gameOverScreen">
            <h1>Game Over!</h1>
            <p id="finalScore">Score: 0</p>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');

        // Set canvas size
        canvas.width = 400;
        canvas.height = 600;

        // Game variables
        let gameRunning = true;
        let score = 0;
        let gameSpeed = 5;

        // Bird object
        const bird = {
            x: 50,
            y: 150,
            width: 30,
            height: 30,
            velocity: 0,
            gravity: 0.35,
            jumpPower: -9,
            maxVelocity: 8,
            wingAngle: 0,
            flappingTime: 0,

            update() {
                this.velocity += this.gravity;
                if (this.velocity > this.maxVelocity) {
                    this.velocity = this.maxVelocity;
                }
                this.y += this.velocity;

                // Update wing animation
                this.flappingTime--;
                if (this.flappingTime > 0) {
                    this.wingAngle = Math.sin(Date.now() / 50) * 30;
                } else {
                    this.wingAngle = Math.sin(Date.now() / 200) * 15;
                }
            },

            flap() {
                this.velocity = this.jumpPower;
                this.flappingTime = 10;
            },

            draw() {
                ctx.save();

                // Main body (vertical oval)
                ctx.fillStyle = '#2ECC71';
                ctx.beginPath();
                ctx.ellipse(this.x + 15, this.y + 18, 10, 15, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#27AE60';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Left wing
                ctx.save();
                ctx.translate(this.x + 8, this.y + 16);
                ctx.rotate((this.wingAngle * Math.PI) / 180);
                ctx.fillStyle = '#2ECC71';
                ctx.beginPath();
                ctx.ellipse(0, 0, 14, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#27AE60';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.restore();

                // Right wing
                ctx.save();
                ctx.translate(this.x + 22, this.y + 16);
                ctx.rotate((-this.wingAngle * Math.PI) / 180);
                ctx.fillStyle = '#2ECC71';
                ctx.beginPath();
                ctx.ellipse(0, 0, 14, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#27AE60';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.restore();

                // Head
                ctx.fillStyle = '#2ECC71';
                ctx.beginPath();
                ctx.arc(this.x + 15, this.y + 8, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#27AE60';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Eye
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x + 18, this.y + 6, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(this.x + 19, this.y + 6, 2, 0, Math.PI * 2);
                ctx.fill();

                // Beak
                ctx.fillStyle = '#FFA500';
                ctx.beginPath();
                ctx.moveTo(this.x + 23, this.y + 8);
                ctx.lineTo(this.x + 32, this.y + 6);
                ctx.lineTo(this.x + 32, this.y + 10);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }
        };

        // Pipes array
        let pipes = [];
        const pipeWidth = 60;
        const pipeGap = 160;

        function createPipe() {
            const minHeight = 50;
            const maxHeight = canvas.height - pipeGap - 50;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;

            pipes.push({
                x: canvas.width,
                topHeight: topHeight,
                bottomY: topHeight + pipeGap,
                scored: false
            });
        }

        function updatePipes() {
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= gameSpeed;

                // Check if bird passed the pipe
                if (!pipes[i].scored && pipes[i].x + pipeWidth < bird.x) {
                    pipes[i].scored = true;
                    score++;
                    scoreDisplay.textContent = `Score: ${score}`;
                    gameSpeed += 0.5;
                }

                // Remove off-screen pipes
                if (pipes[i].x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }
        }

        function drawPipes() {
            ctx.fillStyle = '#2ECC71';
            for (let pipe of pipes) {
                // Top pipe
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                // Bottom pipe
                ctx.fillRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY);

                // Pipe borders
                ctx.strokeStyle = '#27AE60';
                ctx.lineWidth = 2;
                ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                ctx.strokeRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY);
            }
        }

        function checkCollision() {
            // Check ground collision
            if (bird.y + bird.height >= canvas.height) {
                return true;
            }

            // Check ceiling collision
            if (bird.y <= 0) {
                return true;
            }

            // Check pipe collision
            for (let pipe of pipes) {
                if (bird.x < pipe.x + pipeWidth && bird.x + bird.width > pipe.x) {
                    if (bird.y < pipe.topHeight || bird.y + bird.height > pipe.bottomY) {
                        return true;
                    }
                }
            }

            return false;
        }

        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function gameOver() {
            gameRunning = false;
            finalScoreDisplay.textContent = `Score: ${score}`;
            gameOverScreen.classList.add('show');
        }

        function update() {
            if (!gameRunning) return;

            bird.update();

            if (checkCollision()) {
                gameOver();
                return;
            }

            updatePipes();
        }

        function draw() {
            drawBackground();
            drawPipes();
            bird.draw();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Spawn pipes at intervals
        let pipeSpawnCounter = 0;
        const originalGameLoop = gameLoop;
        gameLoop = function() {
            update();
            draw();

            if (gameRunning) {
                pipeSpawnCounter++;
                if (pipeSpawnCounter > 120) {
                    createPipe();
                    pipeSpawnCounter = 0;
                }
            }

            requestAnimationFrame(gameLoop);
        };

        // Event listeners
        document.addEventListener('click', () => {
            if (gameRunning) {
                bird.flap();
            }
        });

        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning) {
                bird.flap();
            }
        });

        function restartGame() {
            gameRunning = true;
            score = 0;
            gameSpeed = 5;
            bird.y = 150;
            bird.velocity = 0;
            pipes = [];
            pipeSpawnCounter = 0;
            scoreDisplay.textContent = 'Score: 0';
            gameOverScreen.classList.remove('show');
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
